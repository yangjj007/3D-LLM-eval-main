adapter: sparse_sdf_qwen3
task: understanding

data:
  data_path: eval_data/understanding.json
  gen_caption_indices: "0"
  default_prompt: "Describe this 3D shape in one sentence:"
  max_samples: null

model:
  vae_config: eval/configs/vae/sdf_vqvae_stage2.json
  vae_ckpt: ../Med-3D-LLM-main/outputs_pad_sdf/sdf_vqvae_256_0.5/ckpts/vqvae_step0041000.pt
  llm_path: LLaMA-Factory/saves/qwen3-4b/sft_bpe_3d_stage2/checkpoint-55000
  trust_remote_code: true
  llm_dtype: bfloat16
  sdf_from_mesh_only: true
  sdf_resolution: 256
  sdf_threshold_factor: 4.0
  input_band_factor: 0.5
  preprocessing_extra_band_factor: 4.0
  inference_band_factor: 2.0
  inference_occ_resolution: 256
  sdf_compute_edge_mask: true
  sdf_sharp_grad_dev_thresh: 0.5
  sdf_cache_dir: eval_data/sdf_cache_eval
  max_safe_3d_length: 15000
  coord_max_3d: 512
  bpe_merge_table: ""
  bpe_base_vocab_size: 8192
  bpe_token_format: id_only

inference:
  max_new_tokens: 512
  temperature: 0.0
  batch_size: 1
  verbose_eval: true

metrics:
  - bleu
  - rouge_l
  - sentence_bert
  - simcse

reporting:
  formats: [json, csv, latex]
  output_dir: eval_results/sparse_sdf_qwen3/understanding
