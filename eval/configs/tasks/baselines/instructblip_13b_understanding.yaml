adapter: instructblip_13b
task: understanding

data:
  metadata_csv: eval_data/metadata.csv
  glb_dir: eval_data
  gen_caption_indices: "0"
  default_prompt: Describe this 3D object.
  max_samples: null

model:
  baseline_repo_dir: third_party/baselines/LAVIS
  model_name: blip2_vicuna_instruct
  model_type: vicuna13b
  # Optional: provide pre-rendered views instead of rendering mesh at runtime.
  input_image_dir: null
  sample_image_map: {}

inference:
  batch_size: 1
  nviews: 4
  resolution: 336
  work_dir: eval_external_work
  official_args:
    use_nucleus_sampling: false

metrics:
  - bleu
  - rouge_l
  - meteor
  - sentence_bert
  - simcse

reporting:
  formats: [json, csv, latex]
  output_dir: eval_results/baselines/instructblip_13b/understanding
