adapter: 3dtopia_xl
task: generation

data:
  metadata_csv: eval_data/metadata.csv
  glb_dir: eval_data
  gen_caption_indices: "0"
  max_samples: null

model:
  baseline_repo_dir: third_party/baselines/3DTopia-XL
  # Official text-conditioned config + TextConditioner. The eval helper supplies
  # the README-required text encoding step missing from upstream inference.py.
  official_config: configs/inference_dit_text.yml
  checkpoint_path: ./pretrained/scaleup_text_ckpt_backup_fp16.pt
  vae_checkpoint_path: ./pretrained/model_vae_fp16.pt
  text_encoder_path: ./pretrained/open_clip_pytorch_model.bin

inference:
  batch_size: 1
  work_dir: eval_external_work
  seed: 42
  ddim: 25
  cfg: 6
  mc_resolution: 256
  timeout_sec: null

metrics:
  - fd_inception
  - kd_inception
  - clip_score

reporting:
  formats: [json, csv, latex]
  output_dir: eval_results/baselines/3dtopia_xl/generation
