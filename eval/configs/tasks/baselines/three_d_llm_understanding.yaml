adapter: three_d_llm
task: understanding

data:
  metadata_csv: eval_data/metadata.csv
  glb_dir: eval_data
  gen_caption_indices: "0"
  default_prompt: Describe the 3D scene.
  max_samples: null

model:
  baseline_repo_dir: third_party/baselines/3D-LLM
  checkpoint_path: pretrain_blip2_sam_flant5xl_v1.pth
  # Official 3D-LLM inference consumes precomputed features and point grids.
  # Use directories plus suffixes, or `sample_feature_map` for per-sample paths.
  feature_dir: eval_data/3dllm/objaverse_feat/features
  points_dir: eval_data/3dllm/objaverse_feat/points
  feature_suffix: _outside.pt
  points_suffix: _outside.npy

inference:
  batch_size: 1
  max_len: 50
  length_penalty: 1.2
  repetition_penalty: 1.5

metrics:
  - bleu
  - rouge_l
  - meteor
  - sentence_bert
  - simcse

reporting:
  formats: [json, csv, latex]
  output_dir: eval_results/baselines/three_d_llm/understanding
