adapter: instantmesh
task: generation

data:
  data_path: eval_data/generation.json
  max_samples: null

model:
  baseline_repo_dir: third_party/baselines/InstantMesh
  official_config: configs/instant-mesh-large.yaml
  # InstantMesh is official image-to-3D. Provide proxy images by sample id.
  input_image_dir: eval_data/baseline_images
  default_input_image: null
  sample_image_map: {}

inference:
  batch_size: 1
  work_dir: eval_external_work
  diffusion_steps: 75
  seed: 42
  view: 6
  no_rembg: false
  export_texmap: false
  save_video: false
  timeout_sec: null

metrics:
  - fd_inception
  - kd_inception
  - clip_score

reporting:
  formats: [json, csv, latex]
  output_dir: eval_results/baselines/instantmesh/generation
