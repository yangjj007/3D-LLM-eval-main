# Text-to-3D (sparse BPE) with paper-style render metrics + optional Trellis coloring.
adapter: sparse_sdf_qwen3
task: generation

data:
  data_path: eval_data/generation.json
  max_samples: null

model:
  vae_config: eval/configs/vae/sdf_vqvae_stage2.json
  vae_ckpt: /yangjunjie/Med-3D-LLM-main/pad_outputs/sdf_vqvae_stage2_512_0.5/ckpts/vqvae_step0000300.pt
  llm_path: /path/to/qwen3-sft-checkpoint
  trust_remote_code: true
  llm_dtype: bfloat16
  hf_cache_dir: ./eval_data/hf_cache
  sdf_from_mesh_only: true
  sdf_resolution: 512
  sdf_threshold_factor: 0.5
  sdf_cache_dir: eval_data/sdf_cache_eval
  mc_threshold: 0.0
  bpe_merge_table: ""
  bpe_base_vocab_size: 8192
  bpe_token_format: id_only
  trellis_text_path: JeffreyXiang/TRELLIS-text-xlarge
  colorization:
    enabled: false
    simplify: 0.95
    texture_size: 1024
  white_mesh_postprocess:
    enabled: true
    log_timings: true
    bounds_min: [-1.0, -1.0, -1.0]
    bounds_max: [1.0, 1.0, 1.0]
    marching_cubes_iso: 0.5
    voxel_remesh:
      enabled: true
      resolution: 512
      use_gpu_morphology: true
    connect_components:
      enabled: true
      min_component_ratio: 0.05
      max_components: 8
      bridge_radius: 1
    morphology:
      enabled: true
      closing_iters: 1
      opening_iters: 0
      kernel_size: 3
    fill_holes:
      enabled: true
    marching_cubes:
      enabled: true
    taubin:
      enabled: false
      iterations: 5
      lamb: 0.5
      nu: -0.53
    decimate:
      enabled: false
      target_triangles: 50000
    pymeshfix:
      enabled: false
      verbose: false
    keep_largest_component:
      enabled: true
      criterion: faces

inference:
  max_new_tokens: 2048
  temperature: 0.0
  top_k: 50
  top_p: 0.7
  reconstruct_prompt: "Reconstruct this 3D shape in mesh token format:"
  batch_size: 1
  verbose_eval: false

metrics:
  - fd_inception
  - kd_inception
  - clip_score

metrics_config:
  render:
    nviews: 4
    resolution: 512
    kid_subset_size: 50
    clip_model: openai/clip-vit-base-patch32

reporting:
  formats: [json, csv, latex]
  output_dir: eval_results/sparse_vqvae/generation
