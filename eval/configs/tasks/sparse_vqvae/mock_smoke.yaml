      closing_iters: 1
      opening_iters: 0
      kernel_size: 3
    fill_holes:
      enabled: true
    marching_cubes:
      enabled: true
    taubin:
      enabled: false
      iterations: 5
      lamb: 0.5
      nu: -0.53
    decimate:
      enabled: false
      target_triangles: 50000
    pymeshfix:
      enabled: false
      verbose: false
    keep_largest_component:
      enabled: true
      criterion: faces

